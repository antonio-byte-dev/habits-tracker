services:

  backend:
    build: ./backend
    container_name: habit-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_MONGODB_URI=${MONGO_URI}
      
  frontend:
    build: ./frontend
    container_name: habit-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend


volumes:
  mongo-data:
  mongo-config:

  